name: om-player

services:
  mysql:
    image: mysql:8.4
    env_file:
      - ./backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-om_player}
      MYSQL_USER: ${MYSQL_USER:-om}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-om}
    ports:
      - '3306:3306'
    volumes:
      - om_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u${MYSQL_USER:-om}', '-p${MYSQL_PASSWORD:-om}']
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-om}:${MYSQL_PASSWORD:-om}@mysql:3306/${MYSQL_DATABASE:-om_player}?serverVersion=8.4&charset=utf8mb4
    volumes:
      - ./backend:/app
      - ./openapi:/app/openapi:ro
      - app_vendor:/app/vendor
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '8000:80'
    volumes:
      - ./backend:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  om_mysql_data:
  app_vendor:
